<svg width="1000" height="240" viewBox="0 0 1000 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kestrel — single-host eBPF runtime security and observability">
  <defs>
    <linearGradient id="accent" x1="16" y1="24" x2="112" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="0.55" stop-color="#34d399"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="1" y="1" width="998" height="238" rx="20" fill="#0a0e12"/>
  <rect x="1.5" y="1.5" width="997" height="237" rx="19.5" fill="none" stroke="#1f2937" stroke-width="1"/>

  <!-- faint event sparkline across the whole banner (the live feed) -->
  <polyline points="40,196 120,196 150,168 178,196 300,196 330,150 360,196 520,196 548,176 576,140 604,196 720,196 752,160 784,196 960,196"
            fill="none" stroke="url(#fade)" stroke-width="2"/>

  <!-- logo mark -->
  <g transform="translate(44,42) scale(1.22)">
    <rect x="2" y="2" width="124" height="124" rx="28" fill="#0b1117"/>
    <rect x="2.5" y="2.5" width="123" height="123" rx="27.5" fill="none" stroke="#1f2937" stroke-width="1"/>
    <circle cx="64" cy="64" r="42" fill="url(#glow)"/>
    <path d="M64 14 L107 38 L107 86 L64 110 L21 86 L21 38 Z" fill="none" stroke="#34d399" stroke-opacity="0.20" stroke-width="2"/>
    <circle cx="64" cy="64" r="34" fill="none" stroke="#34d399" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="3 6"/>
    <circle cx="64" cy="64" r="25" fill="none" stroke="#22d3ee" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="2 7"/>
    <path d="M64 22 L69 38 L69 46 L112 68 L74 60 L72 72 L67 95 L64 107 L61 95 L56 72 L54 60 L16 68 L59 46 L59 38 Z"
          fill="url(#accent)" stroke="#0a0e12" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="244" y="118" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace"
        font-size="78" font-weight="800" letter-spacing="6" fill="#f4f4f5">KESTREL</text>
  <rect x="248" y="138" width="118" height="4" rx="2" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="250" y="172" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="23" fill="#9ca3af">Single-host eBPF runtime security &amp; observability</text>

  <!-- caption -->
  <text x="250" y="204" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace"
        font-size="16" letter-spacing="1" fill="#34d399" fill-opacity="0.85">live feed · process tree · network map · alerts</text>
</svg>
